<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Blox - Loja Oficial</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f8ff;
            color: #000;
        }

        header {
            background-color: #0091ff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .menu-botao, .carrinho {
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .logo {
            color: white;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .barra-pesquisa {
            padding: 15px 20px;
        }

        .barra-pesquisa input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .titulo-jogos {
            text-align: center;
            margin: 10px 20px 25px;
            padding: 10px;
            border: 2px solid #0091ff;
            border-radius: 25px;
            color: #0091ff;
            font-size: 18px;
            font-weight: bold;
            background-color: white;
        }

        .container-jogos {
            padding: 0 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .jogo-card {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.2s;
            background: white;
        }

        .jogo-card:hover {
            transform: scale(1.02);
        }

        .jogo-imagem {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .botao-suporte {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 55px;
            height: 55px;
            background-color: #0091ff;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <div class="menu-botao">☰</div>
    <div class="logo">TOP BLOXX</div>
    <div class="carrinho">🛒</div>
</header>

<div class="barra-pesquisa">
    <input type="text" placeholder="🔍 Buscar produto...">
</div>

<div class="titulo-jogos">🎮 JOGOS DISPONÍVEIS</div>

<div class="container-jogos">

    <!-- BLOX FRUITS -->
    <div class="jogo-card" onclick="window.location.href='blox-fruits.html'">
        <img src="https://i.imgur.com/3QKXv1B.png"
             alt="Blox Fruits"
             class="jogo-imagem"
             onerror="this.src='https://via.placeholder.com/800x180/0091ff/FFFFFF?text=BLOX+FRUITS'">
    </div>

    <!-- STEAL A BRAINROT -->
    <div class="jogo-card">
        <img src="https://i.imgur.com/5rKJX9A.png"
             alt="Steal a Brainrot"
             class="jogo-imagem"
             onerror="this.src='https://via.placeholder.com/800x180/0091ff/FFFFFF?text=STEAL+A+BRAINROT'">
    </div>

    <!-- FUJA DO TSUNAMI -->
    <div class="jogo-card">
        <img src="https://i.imgur.com/8mNQx2C.png"
             alt="Fuja do Tsunami"
             class="jogo-imagem"
             onerror="this.src='https://via.placeholder.com/800x180/0091ff/FFFFFF?text=FUJA+DO+TSUNAMI'">
    </div>

</div>

<div class="botao-suporte">💬</div>

<footer>
    <p>&copy; 2026 Top Bloxx - Todos os direitos reservados</p>
</footer>

</body>
</html>

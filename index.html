<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Blox - Loja Oficial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f4ff;
        }

        header {
            background-color: #007bff;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .menu-icon {
            color: white;
            font-size: 26px;
            font-weight: bold;
        }

        .logo {
            color: white;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .carrinho {
            background-color: white;
            color: #007bff;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
        }

        .barra-pesquisa {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .barra-pesquisa input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .titulo-jogos {
            max-width: 1200px;
            margin: 10px auto 25px;
            padding: 0 20px;
        }

        .botao-titulo {
            background-color: #e6f0ff;
            color: #007bff;
            border: 2px solid #007bff;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 17px;
            font-weight: bold;
            display: inline-block;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto 40px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card-jogo {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.3s;
            text-decoration: none;
            background-color: #ddd;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #007bff;
            font-size: 22px;
            font-weight: bold;
        }

        .card-jogo:hover {
            transform: scale(1.02);
        }

        footer {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon">≡</div>
        <div class="logo">TOP BLOX</div>
        <div class="carrinho">🛒</div>
    </header>

    <div class="barra-pesquisa">
        <input type="text" placeholder="Buscar produto...">
    </div>

    <div class="titulo-jogos">
        <div class="botao-titulo">🎮 JOGOS DISPONÍVEIS</div>
    </div>

    <div class="container">
        <a href="blox-fruits.html" class="card-jogo">
            🎮 BLOX FRUITS
        </a>

        <div class="card-jogo">
            🧠 STEAL A BRAINROT
        </div>

        <div class="card-jogo">
            🌊 FUJA DO TSUNAMI
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Top Blox - Todos os direitos reservados</p>
    </footer>

</body>
</html>

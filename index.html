<!DOCTYPE html>
<html>
<head>

<title>Top Bloxx</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#e8e8e8,#d9d9ff);
}

.topo{
background:linear-gradient(90deg,#6f2cff,#4a18c9);
padding:25px;
text-align:center;
color:white;
font-size:40px;
font-weight:bold;
letter-spacing:2px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.busca{
padding:20px;
text-align:center;
}

input{
width:90%;
padding:15px;
border:none;
border-radius:30px;
font-size:18px;
outline:none;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.titulo{
width:90%;
margin:auto;
background:white;
padding:20px;
border-radius:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#6f2cff;
margin-bottom:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.catalogo{
width:90%;
margin:auto;
position:relative;
border-radius:20px;
overflow:hidden;
cursor:pointer;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
transition:0.3s;
}

.catalogo:hover{
transform:scale(1.02);
}

.catalogo img{
width:100%;
display:block;
}

.txt{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:clamp(25px, 8vw, 45px);
font-weight:bold;
text-align:center;
text-shadow:0 0 15px black;
}

.contas{
display:none;
padding:20px;
}

.card{
background:white;
margin-bottom:20px;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
border-radius:15px;
margin-bottom:10px;
}

.preco{
color:green;
font-size:25px;
font-weight:bold;
}

button{
width:100%;
padding:15px;
background:linear-gradient(90deg,#6f2cff,#4a18c9);
border:none;
color:white;border-radius:10px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.85;
transform:scale(1.02);
}

</style>

</head>

<body>

<div class="topo">
TOP BLOXX
</div>

<div class="busca">
<input placeholder="Buscar produto">
</div>

<div class="titulo">
🎮 JOGOS DISPONÍVEIS
</div>

<div class="catalogo" onclick="abrir()">

<img src="https://images.unsplash.com/photo-1627856675698-74645f18c7b6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
onerror="this.src='https://via.placeholder.com/800x400?text=Imagem+indisponivel'">

<div class="txt">
CONTAS<br>
BLOX FRUIT
</div>

</div>

<div class="contas" id="contas">

<div class="card">

<img src="https://images.unsplash.com/photo-1593376912079-365e0d058076?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
onerror="this.src='https://via.placeholder.com/400x300?text=Conta+V4+Draco'">

<h2>🐉 Conta V4 Draco</h2>

<p class="preco">R$46,00</p>

<button>Comprar</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1580587670778-47c4c29bb751?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80"
onerror="this.src='https://via.placeholder.com/400x300?text=Conta+Aleatoria'">

<h2>🎲 Conta V4 Aleatória</h2>

<p class="preco">R$5,00</p>

<button>Comprar</button>

</div>

</div>

<script>

function abrir(){
let contas = document.getElementById("contas");
contas.style.display = contas.style.display === "block" ? "none" : "block";
}

</script>

</body>
  </html>

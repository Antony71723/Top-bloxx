<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Pix | Top Bloxx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-white text-gray-800 min-h-screen flex flex-col items-center justify-center p-5">

    <div class="w-full max-w-md text-center">
        <h1 class="text-2xl font-bold mb-6 text-principal">Pagamento via PIX</h1>

        <!-- QR Code -->
        <div class="bg-white p-3 border border-gray-200 rounded-xl mb-6 inline-block">
            <img src="https://i.imgur.com/8Z7X7yY.jpeg" alt="QR Code Pix" class="w-60 h-60 object-contain">
        </div>

        <!-- Chave Pix -->
        <div class="bg-gray-100 p-4 rounded-lg mb-6">
            <p class="text-sm text-gray-600 mb-2">Chave Pix (CPF):</p>
            <p id="chavePix" class="font-bold text-lg mb-3">123.456.789-00</p>
            <button onclick="copiarChave()" class="bg-principal hover:bg-principal/80 text-white py-2 px-4 rounded-lg text-sm font-medium">
                <i class="fa fa-copy mr-1"></i> Copiar Chave
            </button>
        </div>

        <!-- Botão Fechar -->
        <button onclick="fecharPagina()" class="w-full bg-gray-300 hover:bg-gray-400 py-3 rounded-lg font-bold transition">
            Fechar
        </button>
    </div>

    <script>
        function copiarChave() {
            const chave = document.getElementById('chavePix').textContent;
            navigator.clipboard.writeText(chave);
            alert('Chave copiada com sucesso! ✅');
        }

        function fecharPagina() {
            window.close();
            window.location.href = 'index.html';
        }
    </script>

</body>
</html>

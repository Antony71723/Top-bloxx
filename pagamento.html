<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pagamento PIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-black/95 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-6 max-w-sm w-full text-center">
        <h3 class="text-[#6D28D9] font-bold text-xl mb-4">PAGAMENTO VIA PIX</h3>

        <div class="mb-4">
            <img src="https://i.imgur.com/3kLpQ8b.png" alt="QR Code Pix" class="w-52 h-52 mx-auto rounded border border-gray-300">
        </div>

        <div class="bg-gray-100 p-3 rounded-lg mb-4">
            <p class="text-sm text-gray-600 mb-2">Código Pix Copia e Cola:</p>
            <p id="codigoPix" class="text-xs font-mono break-all bg-white p-2 rounded border border-gray-300">00020126580014br.gov.bcb.pix0136SUACHAVEPIX</p>
        </div>

        <div class="flex gap-3">
            <button onclick="copiar()" class="flex-1 bg-[#6D28D9] hover:bg-[#6D28D9]/80 text-white py-2 rounded-lg font-medium">
                📋 Copiar Código
            </button>
            <button onclick="fechar()" class="flex-1 bg-[#EF4444] hover:bg-[#EF4444]/80 text-white py-2 rounded-lg font-medium">
                ❌ Fechar
            </button>
        </div>

        <p class="text-xs text-gray-500 mt-4">Após pagar, envie o comprovante para receber sua conta!</p>
    </div>

    <script>
        function copiar() {
            let codigo = document.getElementById("codigoPix").textContent;
            navigator.clipboard.writeText(codigo);
            alert("✅ Código PIX copiado com sucesso!");
        }

        function fechar() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>

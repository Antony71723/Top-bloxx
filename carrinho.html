<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho | Top Bloxx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#6D28D9',
                        escuro: '#121214',
                        card: '#1E1E20',
                        verde: '#10B981',
                        vermelho: '#EF4444',
                        amarelo: '#F59E0B',
                        azulclaro: '#0EA5E9'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-escuro text-white min-h-screen flex flex-col">

    <header class="bg-card/80 backdrop-blur-sm sticky top-0 z-50 border-b border-principal/20">
        <div class="container mx-auto px-4 py-3 flex items-center">
            <button onclick="voltar()" class="bg-principal/20 hover:bg-principal/40 transition px-3 py-1 rounded-lg text-sm flex items-center gap-1 mr-4">
                <i class="fa fa-arrow-left"></i> Voltar
            </button>
            <h1 class="font-bold text-lg">Seu Carrinho</h1>
        </div>
    </header>

    <main class="flex-1 container mx-auto px-4 py-6">
        <div class="bg-card rounded-xl p-5 mb-6">
            <h2 id="nomeProduto" class="font-bold text-lg mb-2"></h2>
            <p class="text-gray-300 mb-1">Valor: <span id="precoProduto" class="font-bold text-verde"></span></p>
            <p class="mb-4">Status: <span id="statusEstoque" class="font-medium"></span></p>

            <div id="avisoEstoque" class="hidden bg-vermelho/20 border border-vermelho/50 text-vermelho p-3 rounded-lg mb-4">
                ⚠️ Este produto está sem estoque no momento! Aguarde novas reposições.
            </div>

            <button id="btnFinalizar" class="w-full bg-principal hover:bg-principal/80 py-3 rounded-lg font-bold transition">
                Finalizar Compra
            </button>
        </div>
    </main>

    <script>
        // Pegar dados salvos
        const nome = localStorage.getItem('produtoNome');
        const preco = localStorage.getItem('produtoPreco');
        const estoque = localStorage.getItem('produtoEstoque');

        // Mostrar dados na tela
        document.getElementById('nomeProduto').textContent = nome;
        document.getElementById('precoProduto').textContent = `R$ ${preco}`;

        if(estoque == 0) {
            document.getElementById('statusEstoque').textContent = 'Estoque: Vazio';
            document.getElementById('statusEstoque').classList.add('text-vermelho');
            document.getElementById('avisoEstoque').classList.remove('hidden');
        } else {
            document.getElementById('statusEstoque').textContent = 'Estoque: Disponível';
            document.getElementById('statusEstoque').classList.add('text-verde');
        }

        // Botão finalizar
        document.getElementById('btnFinalizar').addEventListener('click', function() {
            if(estoque == 0) {
                document.getElementById('avisoEstoque').classList.remove('hidden');
            } else {
                window.location.href = 'pagamento.html';
            }
        });

        function voltar() {
            window.location.href = 'index.html';
        }
    </script>

</body>
  </html>

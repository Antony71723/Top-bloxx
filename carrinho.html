<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Carrinho de Compras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>  
        tailwind.config = {  
            theme: {  
                extend: {  
                    colors: {  
                        principal: '#6D28D9',  
                        escuro: '#121214',  
                        card: '#1E1E20',  
                        verde: '#10B981',  
                        vermelho: '#EF4444'
                    }
                }
            }
        }  
    </script>
</head>
<body class="bg-escuro text-white min-h-screen p-4">
    <div class="max-w-md mx-auto bg-card rounded-xl p-5 mt-10">
        <button onclick="voltar()" class="bg-principal/20 hover:bg-principal/40 px-3 py-1 rounded-lg mb-4 flex items-center gap-1">
            <i class="fa fa-arrow-left"></i> Voltar
        </button>

        <h2 id="nomeProdutoCarrinho" class="font-bold text-lg mb-3"></h2>
        <p class="mb-2">Valor: <span id="precoProdutoCarrinho" class="text-verde font-bold"></span></p>
        <p class="mb-4">Status: <span id="statusEstoqueCarrinho" class="font-medium"></span></p>

        <div id="avisoEsgotado" class="escondido bg-vermelho/20 border border-vermelho p-3 rounded-lg mb-4 text-sm">
            ⚠️ Infelizmente esse produto está sem estoque no momento! Aguarde novas reposições.
        </div>

        <button onclick="finalizar()" class="w-full bg-principal hover:bg-principal/80 py-3 rounded-lg font-bold">
            Finalizar Compra
        </button>
    </div>

    <script>
        // Pega os dados salvos da página anterior
        let nome = localStorage.getItem("nomeProduto");
        let preco = localStorage.getItem("precoProduto");
        let estoque = localStorage.getItem("temEstoque");

        // Mostra os dados na tela
        document.getElementById("nomeProdutoCarrinho").textContent = nome;
        document.getElementById("precoProdutoCarrinho").textContent = "R$ " + preco;

        if(estoque == 0) {
            document.getElementById("statusEstoqueCarrinho").textContent = "Estoque: Vazio";
            document.getElementById("statusEstoqueCarrinho").className = "text-vermelho";
        } else {
            document.getElementById("statusEstoqueCarrinho").textContent = "Estoque: Disponível";
            document.getElementById("statusEstoqueCarrinho").className = "text-verde";
        }

        function finalizar() {
            if(estoque == 0) {
                document.getElementById("avisoEsgotado").classList.remove("escondido");
            } else {
                window.location.href = "pagamento.html";
            }
        }

        function voltar() {
            window.history.back();
        }
    </script>
</body>
</html>
